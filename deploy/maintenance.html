<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temporarily unavailable</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f8fb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(34rem, calc(100vw - 2rem));
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 2.8vw, 2.5rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Temporarily unavailable</h1>
      <p>
        The clinic scheduling system is being updated or restarted. Please try
        again in a few minutes.
      </p>
    </main>
  </body>
</html>
